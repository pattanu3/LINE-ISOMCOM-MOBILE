<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I SOM CPU - คิวงานปัจจุบัน</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="mobile-container">
    
    <div class="top-header">
        <div>
            <h1>I SOM CPU</h1>
            <p>isomcpu.repair.net</p>
        </div>
        <i class="fa-solid fa-xmark fs-3 text-secondary"></i>
    </div>

    <div class="welcome-banner p-0">  
        <div class="user-info-box">
            <img src="https://placehold.co/100x100?text=Profile" alt="Profile" class="profile-pic">
            <div class="welcome-text">
                <h2>ยินดีต้อนรับ</h2>
                <h3>- Nutt -</h3>
            </div>
        </div>
        <div class="welcome-instruction pe-3">คิวงานปัจจุบัน</div>
    </div>

    <div class="form-container">
        <div class="row g-3">
            
            <div class="col-6">
                <div class="queue-summary-box1">
                    <h6 class="waitqueue">คิวรอตรวจเช็คปัญหา :</h6>
                    <hr class="line">
                    <div class="d-flex justify-content-center align-items-baseline mt-2">
                        <div class="queue-summary-number text-diagnosis mb-0">5</div>
                        <span class="wait ms-2">คิว</span>
                    </div>
                </div>
            </div>

            <div class="col-6">
                <div class="queue-summary-box2">
                    <h6 class="waitqueue">คิวรอซ่อม :</h6>
                    <hr class="line">
                    <div class="d-flex justify-content-center align-items-baseline mt-2">
                        <div class="queue-summary-number text-repair mb-0">3</div>
                        <span class="wait ms-2">คิว</span>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
