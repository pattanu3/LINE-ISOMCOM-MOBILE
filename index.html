<script>
    let userId = "";
    initLiff();
    async function initLiff() {
            try {
                await liff.init({ liffId: "2009179011-zi2JZ0h4" }); 
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    const userId = profile.userId;
                    console.log(profile.userId);
                    console.log(profile.displayName);
                    console.log(profile.pictureUrl);
                    console.log(profile.statusMessage);

                    // แสดงผลบนหน้าจอ
                    document.getElementById('user-id').innerText = userId;
                    document.getElementById('profileImg').src = profile.pictureUrl;
                    document.getElementById('displayName').textContent = profile.displayName;
                }
            } catch (error) {
                console.error("LIFF Error:", error);
                document.getElementById('user-id').innerText = "เกิดข้อผิดพลาด: " + error.message;
            }
        }

    Confirmform = document.getElementById('ConfirmDate');
    Confirmform.addEventListener("click",async function (e){
        e.preventDefault();
            console.log("กำลังส่งข้อมูล..."); // เช็คว่าฟังก์ชันทำงานไหม
            // ✅ ดึงค่าโดยตรงจากตัวหนังสือสีน้ำเงินที่โชว์บนหน้าจอ (span id="user-id")
            const lineIdFromSpan = document.getElementById('user-id').innerText;

            // ตรวจสอบเบื้องต้น ถ้ายังโหลดไม่เสร็จไม่ให้ส่ง
            if (!lineIdFromSpan || lineIdFromSpan === "กำลังโหลด...") {
                alert("กรุณารอให้ระบบโหลด LINE ID ให้สำเร็จก่อนครับ");
                return;
            }
            // 1. สร้างวันที่ปัจจุบัน (Today) ในรูปแบบ YYYY-MM-DD ให้ตรงกับเวลาไทย (Local Time)
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0'); 
            const dd = String(today.getDate()).padStart(2, '0');
            const todayFormatted = `${yyyy}-${mm}-${dd}`; // จะได้ "2026-03-01"
            
            // ... (ส่วนการเตรียม data เหมือนเดิม)
            const repairData = {
                // ตรวจสอบชื่อ Key ด้านซ้ายมือให้ตรงกับ Schema ใน FastAPI เป๊ะๆ
                lineUserId: lineIdFromSpan,
                fullName: document.getElementById('inputName').value,
                phoneNumber: document.getElementById('inputPhone').value,
                queueId: "A" + Math.floor(Math.random() * 900000 + 100000),
                deviceType: document.getElementById('inputDevice').value,
                problemType: document.getElementById('inputProblem').value,
                problemDetail: document.getElementById('inputDetail').value,
                address: document.getElementById("modalAddress").textContent,
                deliveryDate: todayFormatted,
                pickupDate: document.getElementById('inputDate').value,
            };

            try {
                const response = await fetch('https://uncautiously-overwealthy-margie.ngrok-free.dev/repairs/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(repairData)
                });

                const result = await response.json(); // อ่านคำตอบจาก Server

                if (response.ok) {
                    alert("แจ้งซ่อมสำเร็จ! เจ้าหน้าที่จะติดต่อกลับโดยเร็ว");
                    liff.closeWindow();
                } else {
                    // ถ้า Server ตอบกลับมาเป็น Error (เช่น 422 หรือ 500)
                    alert("Server Error: " + JSON.stringify(result.detail));
                }
            } catch (error) {
                // ถ้าเชื่อมต่อ Server ไม่ได้เลย (เช่น URL ผิด หรือติด CORS)
                alert("Network Error: " + error.message);
            }
        
    });
</script>
